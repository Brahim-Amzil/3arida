# Manual preview deploy (GitHub Environment: staging).
# Requires repository secret: VERCEL_TOKEN (https://vercel.com/account/tokens)
# Org/project IDs default from .vercel/project.json; override with repo Variables if needed.

name: Deploy Vercel (preview / staging)

on:
  workflow_dispatch:

concurrency:
  group: deploy-vercel-preview
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_rUBJjRM8IajHS6UWvdS6PEPS
  VERCEL_PROJECT_ID: prj_Mr732MRDN4ljCwqLyxE6nqs8rHtf

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build (Vercel preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt (preview URL)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN"

# Manual production deploy. Configure GitHub Environment "production" with required reviewers
# before relying on this as a safety gate.
# Requires repository secret: VERCEL_TOKEN (https://vercel.com/account/tokens)

name: Deploy Vercel (production)

on:
  workflow_dispatch:

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_rUBJjRM8IajHS6UWvdS6PEPS
  VERCEL_PROJECT_ID: prj_Mr732MRDN4ljCwqLyxE6nqs8rHtf

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

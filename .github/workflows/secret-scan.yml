name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan-changed-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine changed files
        id: changed-files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          else
            FILES="$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})"
          fi

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run secret scan on changed files
        shell: bash
        run: |
          if [ -z "${{ steps.changed-files.outputs.files }}" ]; then
            echo "No changed files to scan."
            exit 0
          fi
          printf '%s\n' "${{ steps.changed-files.outputs.files }}" | node scripts/scan-secrets.js --stdin
